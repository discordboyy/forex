<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox</title>
<link rel="stylesheet" href="src/css/style.css?v=2">
<link rel="stylesheet" href="src/css/item.css">
<link rel="stylesheet" href="src/css/search.css">
<link rel="stylesheet" href="src/css/scroll-bar.css">
<link rel="stylesheet" href="src/css/animations.css">
<link rel="stylesheet" href="src/css/media.css">
<script src="src/js/time.js" defer></script>
<script src="src/js/flicker.js" defer></script>
</head>
<body>

<div class="app">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">0:00</span>
    <div class="status-icons">
      <svg class="signal" width="17" height="12" viewBox="0 0 17 12" fill="white">
        <rect class="bar bar1" x="0" y="7" width="3" height="5" rx="0.5"/>
        <rect class="bar bar2" x="4.5" y="4.5" width="3" height="7.5" rx="0.5"/>
        <rect class="bar bar3" x="9" y="2" width="3" height="10" rx="0.5"/>
        <rect class="bar bar4" x="13.5" y="0" width="3" height="12" rx="0.5"/>
      </svg>
      <svg class="wifi" width="16" height="12" viewBox="0 0 16 12">
        <circle class="wifi-dot" cx="8" cy="11" r="1.5"/>
        <path class="wifi-arc wifi-1"
          d="M4.5 8.2a5 5 0 017 0"
          stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path class="wifi-arc wifi-2"
          d="M1.5 5.2a9 9 0 0113 0"
          stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>
      <svg class="battery" width="26" height="13" viewBox="0 0 26 13" fill="none">
        <rect class="battery-outline" x="0.5" y="0.5" width="21" height="12" rx="3.5" stroke="white"/>
        <rect class="battery-fill" x="2" y="2" width="16" height="9" rx="2"/>
        <path class="battery-tip" d="M23 4.5v4a2.5 2.5 0 000-4z"/>
      </svg>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <span class="header-title">Inbox</span>
    <div class="avatar-btn">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="7" r="4" fill="#888"/>
        <path d="M2 18c0-4 3.58-7 8-7s8 3 8 7" stroke="#888" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
  </div>

  <!-- Search Bar -->
  <div class="search-container" id="inboxSearch"></div>

  <!-- Inbox List -->
  <div class="inbox-scroll" id="inboxList"></div>

  <!-- Home Indicator -->
  <div class="home-indicator">
    <div class="home-bar"></div>
  </div>

</div>

<script type="module">

  import { attachExpandEvents }
  from './src/js/inboxExpand.js';

  import { initInboxSearch }
  from './src/components/searchBar.js';

  const iconStyles = [
    { bg: '#34C759', type: 'map' },
    { bg: '#7B61FF', type: 'gear' },
    { bg: '#FF6B35', type: 'star' },
    { bg: '#007AFF', type: 'chat' },
    { bg: '#FF2D55', type: 'heart' },
    { bg: '#5856D6', type: 'bolt' },
    { bg: '#FF9500', type: 'sun' },
    { bg: '#00C7BE', type: 'map' },
    { bg: '#30B0C7', type: 'gear' },
    { bg: '#AF52DE', type: 'star' },
  ];

  const svgIcons = {
    map: `<svg width="27" height="27" viewBox="0 0 27 27" fill="none">
      <path d="M13.5 3C10.0 3 7 6.0 7 9.5c0 5.0 6.5 13.5 6.5 13.5S20 14.5 20 9.5C20 6.0 17.0 3 13.5 3z" fill="white" opacity="0.92"/>
      <circle cx="13.5" cy="9.5" r="2.4" fill="rgba(0,0,0,0.35)"/>
    </svg>`,
    gear: `<svg width="27" height="27" viewBox="0 0 27 27" fill="none">
      <circle cx="13.5" cy="13.5" r="4.5" fill="white" opacity="0.9"/>
      <path d="M13.5 4v2.5M13.5 20.5V23M4 13.5H1.5M25.5 13.5H23M6.4 6.4L8.2 8.2M18.8 18.8l1.8 1.8M6.4 20.6l1.8-1.8M18.8 8.2l1.8-1.8" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
    </svg>`,
    star: `<svg width="27" height="27" viewBox="0 0 27 27" fill="none">
      <path d="M13.5 3.5l2.4 7.3H23l-6 4.3 2.3 7.2-5.8-4.2-5.8 4.2 2.3-7.2-6-4.3h7.1z" fill="white" opacity="0.92"/>
    </svg>`,
    chat: `<svg width="27" height="27" viewBox="0 0 27 27" fill="none">
      <path d="M4 5.5h19a2 2 0 012 2v10a2 2 0 01-2 2H7.5L3 23V7.5a2 2 0 012-2z" fill="white" opacity="0.92"/>
    </svg>`,
    heart: `<svg width="27" height="27" viewBox="0 0 27 27" fill="none">
      <path d="M13.5 22S4 16.5 4 10.5a5.5 5.5 0 0111 0 5.5 5.5 0 0111 0C26 16.5 13.5 22 13.5 22z" fill="white" opacity="0.92"/>
    </svg>`,
    bolt: `<svg width="27" height="27" viewBox="0 0 27 27" fill="none">
      <path d="M15 3L5 15.5h9l-2 8.5 10-13.5h-9z" fill="white" opacity="0.92"/>
    </svg>`,
    sun: `<svg width="27" height="27" viewBox="0 0 27 27" fill="none">
      <circle cx="13.5" cy="13.5" r="4.5" fill="white" opacity="0.95"/>
      <path d="M13.5 4.5v2M13.5 20.5v2M4.5 13.5h-2M22.5 13.5h2M7.5 7.5l1.4 1.4M18.1 18.1l1.4 1.4M7.5 19.5l1.4-1.4M18.1 9L19.5 7.5" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
    </svg>`,
  };

  function mapPinSVG() {
    return `<svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M7 1C4.8 1 3 2.8 3 5c0 3.2 4 8 4 8s4-4.8 4-8C11 2.8 9.2 1 7 1z" stroke="#8e8e93" stroke-width="1.2" fill="none"/>
      <circle cx="7" cy="5" r="1.4" stroke="#8e8e93" stroke-width="1.2" fill="none"/>
    </svg>`;
  }

  function buildItem(item) {
    const style = iconStyles[item.iconIdx % iconStyles.length];
    const iconSvg = svgIcons[style.type] || svgIcons.map;

    const onlineDot =
      item.online
        ? `<span class="online-dot"></span>`
        : '';

    const metaHTML =
      item.hasMeta
        ? `
        <div class="item-meta">
          <span>${mapPinSVG()}</span>
          <span class="meta-text">${item.meta}</span>
        </div>
      `
        : '';

    const places =
      item.places?.map(
        place => `<div class="chip">${place}</div>`
      ).join('') || '';

    const people =
      item.people?.map(
        person => `<div class="chip">${person}</div>`
      ).join('') || '';

    return `
    <div class="inbox-item">

      <div class="inbox-item-inner">

        <div class="app-icon"
            style="background:${style.bg}">
          ${iconSvg}
        </div>

        <div class="item-content">

          <div class="item-top-row">

            <div class="item-name-row">
              <span class="item-name">
                ${item.name}
              </span>

              ${onlineDot}
            </div>

            <div class="item-date-row">

              <span class="item-date">
                ${item.date}
              </span>

              <span class="chevron-icon">

                <svg width="7"
                    height="12"
                    viewBox="0 0 7 12">

                  <path
                    d="M1 1l5 5-5 5"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"/>

                </svg>

              </span>

            </div>

          </div>

          <div class="item-title">
            ${item.title}
          </div>


          <div class="item-preview">
            ${item.preview}
          </div>

          ${metaHTML}

          <!-- EXPANDED -->

          <div class="item-expanded">

            <div class="expanded-message">
              ${item.fullMessage}
            </div>


            <div class="expanded-section">

              <div class="expanded-label">
                Places
              </div>

              <div class="expanded-chips">
                ${places}
              </div>

            </div>


            <div class="expanded-section">

              <div class="expanded-label">
                People
              </div>

              <div class="expanded-chips">
                ${people}
              </div>

            </div>


            <div class="expanded-actions">

              <!-- <button class="action-btn reply-btn">
                Reply
              </button>
              <button class="action-btn share-btn">
                Share
              </button> -->

            </div>


            <div class="expanded-time">
              ${item.timestamp}
            </div>

          </div>

        </div>

      </div>

    </div>
    `;
  }

  /* Загрузка JSON */

  async function loadInbox() {

    const response =
      await fetch('./src/data/inbox.json');

    const inboxData =
      await response.json();

    const now = new Date();

    const filteredInbox = inboxData.filter(item => {

      if (!item.expires) return true;

      const expireDate =
        new Date(item.expires);

      return expireDate > now;

    });

    document
      .getElementById('inboxList')
      .innerHTML =
        filteredInbox
          .map(buildItem)
          .join('');

    attachExpandEvents();
    initInboxSearch({
      root: '#inboxSearch',
      list: '#inboxList'
    });

  }

  /* запуск */

  loadInbox();
</script>

</body>
</html>
